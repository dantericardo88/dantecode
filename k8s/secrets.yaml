# ============================================================================
# DanteCode Kubernetes Secrets
# IMPORTANT: This is a template - DO NOT commit real secrets to git
# Use kubectl create secret or external secret management (Vault, AWS Secrets Manager, etc.)
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: dantecode-secrets
  namespace: default
type: Opaque
stringData:
  # AI Provider API Keys (base64 encoded in production)
  ANTHROPIC_API_KEY: "sk-ant-api03-REPLACE-ME"
  OPENAI_API_KEY: "sk-proj-REPLACE-ME"
  XAI_API_KEY: "xai-REPLACE-ME"
  GOOGLE_API_KEY: "REPLACE-ME"
  GROQ_API_KEY: "gsk_REPLACE-ME"

  # GitHub Integration
  GITHUB_TOKEN: "ghp_REPLACE-ME"
  GITHUB_WEBHOOK_SECRET: "REPLACE-ME"

  # DanteCode API Token
  DANTECODE_API_TOKEN: "REPLACE-ME"

---
# ============================================================================
# DanteCode ConfigMap
# Non-sensitive configuration
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: dantecode-config
  namespace: default
data:
  # Logging
  LOG_LEVEL: "info"
  NODE_ENV: "production"

  # Model Adaptation
  DANTE_MODEL_ADAPTATION_MODE: "observe-only"
  DANTE_DISABLE_MODEL_ADAPTATION: "0"

  # Debug & Telemetry
  DANTECODE_DEBUG: "0"
  DANTECODE_EXPORT_TELEMETRY: "0"

  # Ollama (if using internal service)
  OLLAMA_BASE_URL: "http://ollama:11434"

---
# ============================================================================
# Create secrets from command line (recommended)
# ============================================================================

# kubectl create secret generic dantecode-secrets \
#   --from-literal=ANTHROPIC_API_KEY=sk-ant-api03-... \
#   --from-literal=OPENAI_API_KEY=sk-proj-... \
#   --from-literal=GITHUB_TOKEN=ghp_... \
#   --from-literal=DANTECODE_API_TOKEN=$(openssl rand -hex 32) \
#   --namespace=default
