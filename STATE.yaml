version: "1.0.0"
project_root: "."
created_at: "2026-03-15T00:00:00Z"
updated_at: "2026-03-15T00:00:00Z"

model:
  default:
    provider: "grok"
    model_id: "grok-3"
    max_tokens: 8192
    temperature: 0.1
    context_window: 131072
  fallback:
    - provider: "anthropic"
      model_id: "claude-sonnet-4-6"
      max_tokens: 8192
      temperature: 0.1
      context_window: 200000
  task_overrides:
    code_review: "grok/grok-3"
    documentation: "anthropic/claude-sonnet-4-6"
    quick_qa: "groq/llama-3.3-70b"

pdse:
  enabled: true
  threshold: 85
  hard_violations_allowed: 0
  max_regeneration_attempts: 3
  weights:
    completeness: 0.35
    correctness: 0.30
    clarity: 0.20
    consistency: 0.15
  stub_patterns:
    - "\\bTODO\\b"
    - "\\bFIXME\\b"
    - "\\bHACK\\b"
    - "\\bXXX\\b"
    - "raise NotImplementedError"
    - "pass\\s*#"
    - "\\.\\.\\."
    - "throw new Error\\(['\"]not implemented['\"]\\)"
    - "// @ts-ignore"
    - "as any"
    - "\\bplaceholder\\b"
    - "\\bshim\\b"

autoforge:
  enabled: true
  max_iterations: 3
  lesson_injection_enabled: true
  abort_on_security_violation: true
  gstack_commands:
    - name: "typecheck"
      command: "bun run typecheck"
      run_in_sandbox: false
      timeout_ms: 60000
      failure_is_soft: false
    - name: "lint"
      command: "bun run lint"
      run_in_sandbox: false
      timeout_ms: 30000
      failure_is_soft: false
    - name: "test"
      command: "bun run test"
      run_in_sandbox: true
      timeout_ms: 120000
      failure_is_soft: true

git:
  auto_commit: true
  commit_footer: "Generated with DanteCode (https://dantecode.dev)\n\nCo-Authored-By: DanteCode <noreply@dantecode.dev>"
  worktree_enabled: true
  worktree_base_dir: ".dantecode/worktrees"
  push_on_commit: false
  branch_naming_pattern: "dc/{session_id_short}/{task_slug}"
  require_clean_worktree: true

sandbox:
  enabled: false
  image: "ghcr.io/dantecode/sandbox:latest"
  network_mode: "bridge"
  memory_limit_mb: 2048
  cpu_limit: 2.0
  timeout_ms: 300000
  auto_cleanup: true

skills:
  directory: ".dantecode/skills"
  adapter_version: "1.0.0"
  auto_wrap_on_import: true
  validate_on_import: true
  active_skills: []
  imported_from:
    claude: []
    continue: []
    opencode: []
    native: []

agents:
  directory: ".dantecode/agents"
  noma_enforcement: true
  max_concurrent_agents: 4
  default_tools:
    - "Read"
    - "Write"
    - "Edit"
    - "Bash"
    - "Glob"
    - "Grep"
    - "TodoWrite"
    - "WebFetch"

audit:
  log_path: ".dantecode/audit.jsonl"
  max_size_mb: 100
  rotate_on_exceed: true
  include_full_diffs: false

lessons:
  db_path: ".dantecode/lessons.db"
  max_lessons: 500
  min_severity_for_injection: "medium"

project:
  name: "DanteCode"
  language: "typescript"
  framework: "bun-monorepo"
  agents_file: "AGENTS.dc.md"
  repo_map_enabled: true
  repo_map_max_files: 200
  ignore_patterns:
    - "node_modules/"
    - ".dantecode/worktrees/"
    - "dist/"
    - ".next/"
    - "__pycache__/"

session_history: []
