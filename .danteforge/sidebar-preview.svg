<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 800" width="300" height="800">
  <defs>
    <!-- Dark theme palette (VS Code Dark+) -->
    <style>
      .bg-sidebar { fill: #252526; }
      .bg-header { fill: #383838; }
      .bg-editor { fill: #1E1E1E; }
      .bg-input { fill: #3C3C3C; }
      .bg-button { fill: #0E639C; }
      .bg-badge { fill: #4D4D4D; }
      .bg-passed { fill: #73C991; }
      .bg-failed { fill: #F14C4C; }
      .bg-status { fill: #007ACC; }

      .border { stroke: #3C3C3C; stroke-width: 1; fill: none; }
      .border-user { stroke: #3794FF; stroke-width: 3; }
      .border-assistant { stroke: #73C991; stroke-width: 3; }

      .text-primary { fill: #CCCCCC; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-secondary { fill: #858585; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-header { fill: #BBBBBB; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-white { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-link { fill: #3794FF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-green { fill: #73C991; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .text-button { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

      .zone-label { fill: #569CD6; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 8px; opacity: 0.6; }
      .zone-outline { stroke: #569CD6; stroke-width: 0.5; stroke-dasharray: 3,3; fill: none; opacity: 0.3; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="300" height="800" class="bg-sidebar"/>

  <!-- ========== ZONE: Header ========== -->
  <rect x="0" y="0" width="300" height="36" class="bg-header"/>
  <line x1="0" y1="36" x2="300" y2="36" class="border"/>
  <text x="12" y="23" class="text-header" font-size="13" font-weight="600">DanteCode Chat</text>
  <!-- PDSE Badge -->
  <rect x="218" y="9" width="70" height="18" rx="9" class="bg-passed"/>
  <text x="228" y="22" class="text-white" font-size="11" font-weight="600">PDSE: 92</text>
  <!-- Zone annotation -->
  <text x="288" y="10" class="zone-label" text-anchor="end">header</text>
  <rect x="1" y="1" width="298" height="34" class="zone-outline"/>

  <!-- ========== ZONE: Model Bar ========== -->
  <rect x="0" y="36" width="300" height="32" class="bg-sidebar"/>
  <line x1="0" y1="68" x2="300" y2="68" class="border"/>
  <text x="12" y="56" class="text-secondary" font-size="11">Model:</text>
  <!-- Dropdown -->
  <rect x="52" y="42" width="236" height="22" rx="2" class="bg-input"/>
  <rect x="52" y="42" width="236" height="22" rx="2" class="border"/>
  <text x="58" y="57" class="text-primary" font-size="12">grok-3</text>
  <!-- Dropdown chevron -->
  <polygon points="278,50 282,56 274,56" fill="#858585"/>
  <!-- Zone annotation -->
  <text x="288" y="42" class="zone-label" text-anchor="end">model-bar</text>
  <rect x="1" y="37" width="298" height="30" class="zone-outline"/>

  <!-- ========== ZONE: Context Bar ========== -->
  <rect x="0" y="68" width="300" height="30" class="bg-sidebar"/>
  <line x1="0" y1="98" x2="300" y2="98" class="border"/>
  <!-- Pill 1 -->
  <rect x="12" y="73" width="85" height="20" rx="10" class="bg-badge"/>
  <text x="20" y="87" class="text-white" font-size="11">index.ts</text>
  <text x="84" y="87" class="text-secondary" font-size="12">×</text>
  <!-- Pill 2 -->
  <rect x="103" y="73" width="95" height="20" rx="10" class="bg-badge"/>
  <text x="111" y="87" class="text-white" font-size="11">utils.ts</text>
  <text x="185" y="87" class="text-secondary" font-size="12">×</text>
  <!-- Zone annotation -->
  <text x="288" y="74" class="zone-label" text-anchor="end">context-bar</text>
  <rect x="1" y="69" width="298" height="28" class="zone-outline"/>

  <!-- ========== ZONE: Messages ========== -->
  <!-- Zone annotation -->
  <text x="288" y="108" class="zone-label" text-anchor="end">messages</text>
  <rect x="1" y="99" width="298" height="526" class="zone-outline"/>

  <!-- Message 1: User -->
  <text x="12" y="118" class="text-link" font-size="11" font-weight="600">You</text>
  <rect x="12" y="124" width="276" height="36" rx="6" class="bg-editor"/>
  <rect x="12" y="124" width="276" height="36" rx="6" class="border"/>
  <line x1="12" y1="124" x2="12" y2="160" class="border-user"/>
  <text x="24" y="146" class="text-primary" font-size="13">Add a retry mechanism to the API client</text>

  <!-- Message 2: Assistant -->
  <text x="12" y="178" class="text-green" font-size="11" font-weight="600">DanteCode</text>
  <rect x="12" y="184" width="276" height="120" rx="6" class="bg-editor"/>
  <rect x="12" y="184" width="276" height="120" rx="6" class="border"/>
  <line x1="12" y1="184" x2="12" y2="304" class="border-assistant"/>
  <text x="24" y="204" class="text-primary" font-size="13">I'll add exponential backoff retry logic</text>
  <text x="24" y="220" class="text-primary" font-size="13">to the API client.</text>
  <!-- Code block inside message -->
  <rect x="24" y="230" width="252" height="64" rx="4" fill="#2D2D2D"/>
  <text x="32" y="248" fill="#569CD6" font-family="'Cascadia Code', monospace" font-size="11">async function</text>
  <text x="140" y="248" fill="#DCDCAA" font-family="'Cascadia Code', monospace" font-size="11">fetchWithRetry</text>
  <text x="32" y="264" fill="#9CDCFE" font-family="'Cascadia Code', monospace" font-size="11">  url: string, retries = 3</text>
  <text x="32" y="280" fill="#C586C0" font-family="'Cascadia Code', monospace" font-size="11">  for (let i = 0; i &lt; retries...</text>

  <!-- Message 3: User -->
  <text x="12" y="322" class="text-link" font-size="11" font-weight="600">You</text>
  <rect x="12" y="328" width="276" height="36" rx="6" class="bg-editor"/>
  <rect x="12" y="328" width="276" height="36" rx="6" class="border"/>
  <line x1="12" y1="328" x2="12" y2="364" class="border-user"/>
  <text x="24" y="350" class="text-primary" font-size="13">Add unit tests for the retry logic</text>

  <!-- Message 4: Assistant (streaming) -->
  <text x="12" y="382" class="text-green" font-size="11" font-weight="600">DanteCode</text>
  <rect x="12" y="388" width="276" height="80" rx="6" class="bg-editor"/>
  <rect x="12" y="388" width="276" height="80" rx="6" class="border"/>
  <line x1="12" y1="388" x2="12" y2="468" class="border-assistant"/>
  <text x="24" y="408" class="text-primary" font-size="13">Here are comprehensive tests using</text>
  <text x="24" y="424" class="text-primary" font-size="13">Vitest with mock fetch...</text>
  <!-- Streaming cursor -->
  <rect x="182" y="416" width="8" height="14" fill="#CCCCCC" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scrollbar track -->
  <rect x="294" y="99" width="4" height="526" rx="2" fill="#3C3C3C" opacity="0.3"/>
  <!-- Scrollbar thumb -->
  <rect x="294" y="99" width="4" height="200" rx="2" fill="#5A5A5A" opacity="0.5"/>

  <!-- ========== ZONE: Typing Indicator ========== -->
  <rect x="0" y="625" width="300" height="24" class="bg-sidebar"/>
  <text x="12" y="641" class="text-secondary" font-size="12" font-style="italic">DanteCode is thinking...</text>
  <circle cx="140" cy="637" r="2" fill="#858585" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="148" cy="637" r="2" fill="#858585" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="156" cy="637" r="2" fill="#858585" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Zone annotation -->
  <text x="288" y="630" class="zone-label" text-anchor="end">typing</text>
  <rect x="1" y="626" width="298" height="22" class="zone-outline"/>

  <!-- ========== ZONE: Input Area ========== -->
  <rect x="0" y="648" width="300" height="52" class="bg-sidebar"/>
  <line x1="0" y1="648" x2="300" y2="648" class="border"/>
  <!-- Textarea -->
  <rect x="12" y="656" width="224" height="36" rx="4" class="bg-input"/>
  <rect x="12" y="656" width="224" height="36" rx="4" class="border"/>
  <text x="22" y="678" fill="#5A5A5A" font-family="-apple-system, sans-serif" font-size="13">Ask DanteCode anything...</text>
  <!-- Send button -->
  <rect x="244" y="660" width="44" height="28" rx="4" class="bg-button"/>
  <text x="252" y="678" class="text-button" font-size="13">Send</text>
  <!-- Zone annotation -->
  <text x="288" y="654" class="zone-label" text-anchor="end">input-area</text>
  <rect x="1" y="649" width="298" height="50" class="zone-outline"/>

  <!-- ========== Divider ========== -->
  <line x1="0" y1="710" x2="300" y2="710" stroke="#569CD6" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <text x="150" y="724" class="zone-label" text-anchor="middle" font-size="9">AUDIT LOG VIEW (collapsed)</text>

  <!-- ========== ZONE: Audit View Preview ========== -->
  <rect x="0" y="730" width="300" height="36" class="bg-header"/>
  <line x1="0" y1="766" x2="300" y2="766" class="border"/>
  <text x="12" y="753" class="text-header" font-size="13" font-weight="600">Audit Log</text>
  <!-- Refresh icon (circle arrow) -->
  <circle cx="276" cy="748" r="8" fill="none" stroke="#858585" stroke-width="1.5"/>
  <polygon points="280,744 284,748 276,748" fill="#858585"/>

  <!-- Audit event row -->
  <rect x="0" y="766" width="300" height="32" class="bg-sidebar"/>
  <line x1="0" y1="798" x2="300" y2="798" class="border"/>
  <!-- Git commit icon -->
  <circle cx="24" cy="782" r="6" fill="none" stroke="#73C991" stroke-width="1.5"/>
  <circle cx="24" cy="782" r="2" fill="#73C991"/>
  <text x="40" y="780" class="text-primary" font-size="12" font-weight="500">Git Commit</text>
  <text x="40" y="794" class="text-secondary" font-size="11">feat: add retry mechanism</text>
  <text x="268" y="786" class="text-secondary" font-size="10">2m ago</text>

  <!-- Zone annotation -->
  <text x="288" y="736" class="zone-label" text-anchor="end">audit-view</text>
  <rect x="1" y="731" width="298" height="66" class="zone-outline"/>

  <!-- ========== Frame border ========== -->
  <rect x="0" y="0" width="300" height="800" fill="none" stroke="#3C3C3C" stroke-width="2"/>
</svg>
