name: "DanteCode PR Review"
description: "Automated PR review using DanteForge PDSE scoring and constitutional verification"

branding:
  icon: "eye"
  color: "purple"

inputs:
  github-token:
    description: "GitHub token for API access and posting reviews"
    required: true
    default: "${{ github.token }}"
  severity:
    description: "Review severity threshold: strict, normal, or lenient"
    required: false
    default: "normal"
  post-comments:
    description: "Post review comments to the PR (true/false)"
    required: false
    default: "true"
  fail-below:
    description: "Fail the action when the overall PDSE score is below this threshold (0-100)"
    required: false
    default: "60"

outputs:
  pdse-score:
    description: "Overall PDSE score across reviewed files (0-100)"
  recommendation:
    description: "Review recommendation: approve, comment, or request-changes"
  bug-count:
    description: "Number of bug findings detected"
  stub-violations:
    description: "Number of anti-stub violations detected"
  posted:
    description: "Whether the review was posted to GitHub (true/false)"

runs:
  using: "node20"
  main: "dist/index.js"
