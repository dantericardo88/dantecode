name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests with coverage
        run: npx vitest run --coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  anti-stub-self-check:
    runs-on: ubuntu-24.04
    needs: [format, typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Run anti-stub scanner on own source
        run: |
          node -e "
          const { readdirSync, readFileSync } = require('fs');
          const { join } = require('path');

          const STUB_PATTERNS = [
            /\bTODO\b/i,
            /\bFIXME\b/i,
            /\bHACK\b(?!.*HACK marker)/i,
            /raise NotImplementedError/i,
            /throw new Error\(['\"]not implemented['\"]?\)/i,
            /\bas\s+any\b/,
            /@ts-ignore/,
            /@ts-nocheck/,
            /\bplaceholder\b/i,
          ];

          const SKIP_DIRS = new Set(['node_modules', 'dist', '.git', '.turbo', 'coverage']);

          function isTestFile(name) {
            return name.endsWith('.test.ts') || name.endsWith('.test.tsx')
                || name.endsWith('.spec.ts') || name.endsWith('.spec.tsx');
          }

          function shouldSkipLine(line) {
            if (line.includes('STUB_PATTERNS') || line.includes('HARD_VIOLATION') || line.includes('SOFT_VIOLATION')) return true;
            if (line.includes('pattern:') || line.includes('RegExp')) return true;
            if (line.trim().startsWith('//') && line.includes('pattern')) return true;
            // Skip string literals that contain stub words as test data
            if (line.includes('mockReturnValue') || line.includes('mockImplementation')) return true;
            return false;
          }

          function scanDir(dir) {
            let violations = 0;
            const entries = readdirSync(dir, { withFileTypes: true });
            for (const entry of entries) {
              const fullPath = join(dir, entry.name);
              if (entry.isDirectory()) {
                if (SKIP_DIRS.has(entry.name)) continue;
                violations += scanDir(fullPath);
              } else if ((entry.name.endsWith('.ts') || entry.name.endsWith('.tsx')) && !isTestFile(entry.name)) {
                const content = readFileSync(fullPath, 'utf-8');
                const lines = content.split('\n');
                for (let i = 0; i < lines.length; i++) {
                  const line = lines[i];
                  if (shouldSkipLine(line)) continue;
                  for (const pattern of STUB_PATTERNS) {
                    if (pattern.test(line)) {
                      console.error('STUB VIOLATION: ' + fullPath + ':' + (i + 1) + ': ' + line.trim());
                      violations++;
                    }
                  }
                }
              }
            }
            return violations;
          }

          const violations = scanDir('packages');
          if (violations > 0) {
            console.error('\n' + violations + ' stub violation(s) found. Anti-Stub Doctrine violated.');
            process.exit(1);
          }
          console.log('Anti-stub self-check passed. Zero stubs found.');
          "
