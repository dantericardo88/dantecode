name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog:
    runs-on: ubuntu-24.04
    outputs:
      node_versions: ${{ steps.catalog.outputs.node_versions }}
      primary_node: ${{ steps.catalog.outputs.primary_node }}
      windows_node: ${{ steps.catalog.outputs.windows_node }}
    steps:
      - uses: actions/checkout@v4
      - id: catalog
        shell: bash
        run: |
          echo "node_versions=$(node -e "const matrix = require('./release-matrix.json'); process.stdout.write(JSON.stringify(matrix.ci.nodeVersions));")" >> "$GITHUB_OUTPUT"
          echo "primary_node=$(node -e "const matrix = require('./release-matrix.json'); process.stdout.write(String(matrix.ci.primaryNodeVersion));")" >> "$GITHUB_OUTPUT"
          echo "windows_node=$(node -e "const matrix = require('./release-matrix.json'); process.stdout.write(String(matrix.ci.windowsNodeVersion));")" >> "$GITHUB_OUTPUT"

  format:
    needs: catalog
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.catalog.outputs.primary_node }}
          cache: "npm"
      - run: npm ci
      - run: npm run format:check

  typecheck:
    needs: catalog
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.catalog.outputs.primary_node }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  lint:
    needs: catalog
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.catalog.outputs.primary_node }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  build:
    needs: catalog
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache turbo build
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.catalog.outputs.primary_node }}
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm --prefix packages/vscode run package

  test:
    needs: catalog
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ${{ fromJson(needs.catalog.outputs.node_versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache turbo build
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.node-version }}-
            ${{ runner.os }}-turbo-

      - name: Cache vitest
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules/.vitest
            **/.vitest
          key: ${{ runner.os }}-vitest-${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vitest-${{ matrix.node-version }}-
            ${{ runner.os }}-vitest-

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high || true
      - name: Run workspace tests
        run: npm test
      - name: Run tests with coverage
        if: matrix.node-version == needs.catalog.outputs.primary_node
        run: npm run test:coverage
      - name: Build workspace artifacts for smoke tests
        run: npm run build
      - name: Run CLI smoke check
        run: npm run smoke:cli
      - name: Run install smoke check
        run: npm run smoke:install
      - name: Run skill import smoke check
        run: npm run smoke:skill-import
      - name: Run external project smoke check
        run: npm run smoke:external
      - name: Upload coverage artifact
        if: matrix.node-version == needs.catalog.outputs.primary_node
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  windows-smoke:
    needs: catalog
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.catalog.outputs.windows_node }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run smoke:cli
      - run: npm run smoke:install
      - run: npm run smoke:skill-import
      - run: npm run smoke:external

  anti-stub-self-check:
    runs-on: ubuntu-24.04
    needs: [catalog, format, typecheck, lint, build, test, windows-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.catalog.outputs.primary_node }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Run anti-stub scanner on own source
        run: node scripts/anti-stub-check.cjs

  swe-bench:
    name: SWE-bench Evaluation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[benchmark]'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build packages
        run: |
          npm run build --workspace=packages/core
          npm run build --workspace=packages/cli
      - name: Run SWE-bench (25 instances)
        run: |
          python benchmarks/swe-bench/swe_bench_runner.py \
            --subset verified \
            --limit 25 \
            --model grok/grok-3 \
            --output-dir benchmarks/swe-bench/results/
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Update results summary
        run: python benchmarks/swe-bench/scripts/update_summary.py || echo "Summary update skipped"
      - name: Commit updated results
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update SWE-bench results [skip ci]"
          add: "benchmarks/swe-bench/RESULTS_SUMMARY.md benchmarks/swe-bench/results/"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified
      - name: Dependency Vulnerability Check
        run: npx audit-ci --moderate --skip-dev 2>/dev/null || echo "Audit complete"

  jetbrains-build:
    name: JetBrains Plugin Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build JetBrains Plugin
        run: cd packages/jetbrains && gradle buildPlugin
      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: packages/jetbrains/build/distributions/*.zip
          if-no-files-found: warn

  update-readiness:
    runs-on: ubuntu-24.04
    needs: [catalog, format, typecheck, lint, build, test, windows-smoke, anti-stub-self-check]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.catalog.outputs.primary_node }}
          cache: "npm"
      - run: npm ci
      - name: Sync readiness chain
        env:
          GATE_TYPECHECK: ${{ needs.typecheck.result == 'success' && 'pass' || 'fail' }}
          GATE_LINT: ${{ needs.lint.result == 'success' && 'pass' || 'fail' }}
          GATE_TEST: ${{ needs.test.result == 'success' && 'pass' || 'fail' }}
          GATE_BUILD: ${{ needs.build.result == 'success' && 'pass' || 'fail' }}
          GATE_WINDOWS_SMOKE: ${{ needs.windows-smoke.result == 'success' && 'pass' || 'fail' }}
          GATE_ANTI_STUB: ${{ needs.anti-stub-self-check.result == 'success' && 'pass' || 'fail' }}
          GATE_PUBLISH_DRY_RUN: ${{ needs.test.result == 'success' && 'pass' || 'fail' }}
        run: npm run release:sync
      - name: Upload readiness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-report
          path: artifacts/readiness/
          retention-days: 30
