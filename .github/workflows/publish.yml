name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package VS Code preview extension
        run: npm --prefix packages/vscode run package

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: CLI smoke
        run: npm run smoke:cli

      - name: Install smoke
        run: npm run smoke:install

      - name: Skill import smoke
        run: npm run smoke:skill-import

      - name: Publish dry-run
        run: npm run publish:dry-run

      - name: Anti-stub self-check
        run: node scripts/anti-stub-check.cjs

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: CLI smoke
        run: npm run smoke:cli

      - name: Install smoke
        run: npm run smoke:install

      - name: Skill import smoke
        run: npm run smoke:skill-import

      - name: External smoke
        run: npm run smoke:external

  sync-readiness:
    name: Sync readiness
    needs: [validate, windows-smoke]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync same-commit readiness
        env:
          GATE_TYPECHECK: ${{ needs.validate.result == 'success' && 'pass' || 'fail' }}
          GATE_LINT: ${{ needs.validate.result == 'success' && 'pass' || 'fail' }}
          GATE_TEST: ${{ needs.validate.result == 'success' && 'pass' || 'fail' }}
          GATE_BUILD: ${{ needs.validate.result == 'success' && 'pass' || 'fail' }}
          GATE_WINDOWS_SMOKE: ${{ needs.windows-smoke.result == 'success' && 'pass' || 'fail' }}
          GATE_ANTI_STUB: ${{ needs.validate.result == 'success' && 'pass' || 'fail' }}
          GATE_PUBLISH_DRY_RUN: ${{ needs.validate.result == 'success' && 'pass' || 'fail' }}
        run: npm run release:sync

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-readiness
          path: artifacts/readiness/
          retention-days: 30

  publish-npm:
    name: Publish to npm
    needs: sync-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Publish npm workspaces
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          for workspace in \
            packages/config-types \
            packages/core \
            packages/mcp \
            packages/danteforge \
            packages/git-engine \
            packages/skill-adapter \
            packages/sandbox \
            packages/cli
          do
            npm publish --workspace "$workspace" --access public --provenance ${DRY_RUN_FLAG}
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish VS Code Extension
    needs: sync-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: cd packages/vscode && npm run build

      - name: Package extension
        run: cd packages/vscode && npm run package

      - name: Publish to VS Code Marketplace
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: cd packages/vscode && npx --yes @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
