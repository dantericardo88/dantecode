name: Feature Request
description: Suggest a new feature for DanteCode
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: false
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - cli
        - core
        - danteforge
        - git-engine
        - sandbox
        - skill-adapter
        - vscode
        - desktop
        - config-types
    validations:
      required: false
