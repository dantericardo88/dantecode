name: Bug Report
description: Report a bug in DanteCode
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DanteCode Version
      description: Output of `dantecode --version`
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - VS Code Extension
        - Desktop App
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / macOS 15 / Ubuntu 24.04"
    validations:
      required: true
