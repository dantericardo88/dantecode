# ============================================================================
# DanteCode Kubernetes Deployment
# Production-ready deployment with resource limits and health checks
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: dantecode
  namespace: default
  labels:
    app: dantecode
    version: v0.9.2
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dantecode
  template:
    metadata:
      labels:
        app: dantecode
        version: v0.9.2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/health"
    spec:
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Init container to verify configuration
      initContainers:
        - name: config-check
          image: dantecode:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
                echo "ERROR: No API keys configured"
                exit 1
              fi
              echo "Configuration validated"
          envFrom:
            - secretRef:
                name: dantecode-secrets
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"

      # Main application container
      containers:
        - name: dantecode
          image: dantecode:latest
          imagePullPolicy: IfNotPresent

          command: ["node", "packages/cli/dist/index.js", "serve", "--port", "3000"]

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Environment from secrets
          envFrom:
            - secretRef:
                name: dantecode-secrets
            - configMapRef:
                name: dantecode-config

          # Environment overrides
          env:
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # Resource limits
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          # Liveness probe (restart if unhealthy)
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # Readiness probe (remove from service if not ready)
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Startup probe (allow longer startup time)
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
            successThreshold: 1

          # Volume mounts
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/.dantecode
            - name: workspace
              mountPath: /workspace

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

      # Volumes
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dantecode-data-pvc
        - name: config
          persistentVolumeClaim:
            claimName: dantecode-config-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: dantecode-workspace-pvc

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# ============================================================================
# Persistent Volume Claims
# ============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dantecode-data-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dantecode-config-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dantecode-workspace-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
