name: Visual Regression Tests

on:
  pull_request:
    branches: [main, feat/*]
  push:
    branches: [main, feat/all-nines]
  workflow_dispatch:

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build ux-polish
        run: npm run build --workspace=packages/ux-polish

      - name: Run visual regression tests
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-failures
          path: tests/visual/**/*.png
          retention-days: 7

  # Job to update visual baselines (manual trigger only)
  update-baselines:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build ux-polish
        run: npm run build --workspace=packages/ux-polish

      - name: Update baselines
        run: npx playwright test --update-snapshots

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/**/*.png
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update visual regression baselines"
          git push
