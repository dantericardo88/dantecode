name: External Gates

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-dry-run:
    name: "Publish Dry Run"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run publish dry-run
        run: npm run publish:dry-run

      - name: Upload dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-dry-run-receipts
          path: artifacts/readiness/external/publish-dry-run.json
          retention-days: 30

  windows-smoke:
    name: "Windows Smoke Test"
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run Windows smoke test
        run: npm run smoke:cli

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-receipts
          path: artifacts/readiness/external/windows-smoke.json
          retention-days: 30

  live-provider:
    name: "Live Provider Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on main branch to avoid burning API quota on every PR
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run live provider smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run smoke:provider
        # Allow failure if API key not set
        continue-on-error: true

      - name: Upload provider test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-provider-receipts
          path: artifacts/readiness/external/live-provider.json
          retention-days: 30

  quickstart-proof:
    name: "Quickstart Verification"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run quickstart proof
        run: npm run release:quickstart-proof

      - name: Upload quickstart artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-proof-receipts
          path: artifacts/readiness/quickstart-proof.json
          retention-days: 30

  gate-summary:
    name: "Gate Summary"
    runs-on: ubuntu-latest
    needs: [publish-dry-run, windows-smoke, live-provider, quickstart-proof]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display gate results
        run: |
          echo "External Gate Results:"
          echo "======================"
          echo ""

          if [ -f artifacts/publish-dry-run-receipts/publish-dry-run.json ]; then
            echo "✅ Publish Dry Run: PASSED"
          else
            echo "❌ Publish Dry Run: FAILED"
          fi

          if [ -f artifacts/windows-smoke-receipts/windows-smoke.json ]; then
            echo "✅ Windows Smoke: PASSED"
          else
            echo "❌ Windows Smoke: FAILED"
          fi

          if [ -f artifacts/live-provider-receipts/live-provider.json ]; then
            echo "✅ Live Provider: PASSED"
          else
            echo "⚠️  Live Provider: SKIPPED (no API key) or FAILED"
          fi

          if [ -f artifacts/quickstart-proof-receipts/quickstart-proof.json ]; then
            echo "✅ Quickstart Proof: PASSED"
          else
            echo "❌ Quickstart Proof: FAILED"
          fi

      - name: Check gate status
        run: |
          # Fail if critical gates failed
          if [ ! -f artifacts/publish-dry-run-receipts/publish-dry-run.json ]; then
            echo "::error::Publish dry run failed"
            exit 1
          fi

          if [ ! -f artifacts/windows-smoke-receipts/windows-smoke.json ]; then
            echo "::error::Windows smoke test failed"
            exit 1
          fi

          if [ ! -f artifacts/quickstart-proof-receipts/quickstart-proof.json ]; then
            echo "::error::Quickstart proof failed"
            exit 1
          fi

          echo "All critical external gates passed ✅"
