version: 2.1

jobs:
  validate:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run smoke:cli
      - run: npm run smoke:install
      - run: npm run smoke:skill-import
      - run: npm run smoke:external
      - run: npm run publish:dry-run

workflows:
  validate:
    jobs:
      - validate
